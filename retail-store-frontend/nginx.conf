# ═══════════════════════════════════════════════════════════════════════════════
# Nginx configuration for the RetailStore frontend (production mode)
#
# THEORY: In development, Vite's built-in dev server handles two jobs:
#   1. Serving JavaScript/CSS/HTML files with hot-module replacement.
#   2. Proxying /api/* requests to the .NET backend.
#
# In production, the Vite dev server is gone. We build a static bundle of HTML,
# CSS, and JavaScript files and serve them with Nginx — a high-performance
# web server optimised for static files. Nginx also takes over the /api proxy
# role so the browser can reach the backend through the same origin.
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;                        # match any hostname
    root /usr/share/nginx/html;           # where Vite's dist/ output was copied
    index index.html;

    # ── API Proxy ────────────────────────────────────────────────────────────
    # Forward every /api/* request to the backend.
    # In Kubernetes, "retailstore-backend-svc" is the ClusterIP Service name.
    # The Service maps port 80 → container port 8080, so no port is needed here.
    # When the Ingress is active, browsers never reach this block (Ingress routes
    # /api directly to the backend service), but it acts as a useful fallback for
    # direct access to the frontend service.
    #
    # proxy_pass ends with /api/ so the path is preserved:
    #   browser sends:  GET /api/products
    #   Nginx forwards: GET http://retailstore-backend-svc/api/products
    location /api/ {
        proxy_pass         http://retailstore-backend-svc/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA Fallback ─────────────────────────────────────────────────────────
    # React Router handles all navigation client-side: clicking a link in the
    # app updates the browser URL without making a real HTTP request.
    # But if the user refreshes the browser on /orders/123, the browser sends a
    # real HTTP GET /orders/123 to Nginx. That file does not exist on disk, so
    # without this rule Nginx would return 404.
    # "try_files $uri $uri/ /index.html" tells Nginx:
    #   1. Try to serve the exact file ($uri).
    #   2. Try to serve it as a directory ($uri/).
    #   3. Fall back to /index.html — React Router then reads the URL and
    #      renders the correct page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ─────────────────────────────────────────────────
    # Vite adds a content hash to every asset filename (e.g. main.a3f2c1.js).
    # The hash changes whenever the file content changes, which means browsers
    # will always fetch the new version — so it is safe to tell browsers to
    # cache these files for one year and never re-validate them.
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
