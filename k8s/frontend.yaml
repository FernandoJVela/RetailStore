apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailstore-frontend
  namespace: retailstore-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retailstore-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: retailstore-frontend
    spec:
      containers:
      - name: nginx
        image: retailstore-frontend:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: retailstore-frontend-svc
  namespace: retailstore-dev
spec:
  selector:
    app: retailstore-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
