apiVersion: v1
kind: Secret
metadata:
  name: retailstore-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "retailstore.labels" . | nindent 4 }}
type: Opaque
data:
  # Helm b64enc encodes the plaintext value passed via --set or values file.
  # In production, use an external secrets manager (Vault, AWS Secrets Manager)
  # and inject the Secret outside of Helm to keep plaintext out of release history.
  DB_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
