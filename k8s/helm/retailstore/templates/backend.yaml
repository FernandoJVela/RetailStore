apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailstore-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "retailstore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: retailstore-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: retailstore-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
      - name: wait-for-sqlserver
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for SQL Server on retailstore-sqlserver-svc:1433..."
          until nc -zw1 retailstore-sqlserver-svc 1433; do
            echo "SQL Server not ready — retrying in 3s"
            sleep 3
          done
          echo "SQL Server is ready"
      containers:
      - name: api
        image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: retailstore-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: retailstore-secrets
              key: DB_PASSWORD
        - name: Jwt__Secret
          valueFrom:
            secretKeyRef:
              name: retailstore-secrets
              key: JWT_SECRET
        - name: ConnectionStrings__DefaultConnection
          value: "Server=retailstore-sqlserver-svc;Database=RetailStoreDb;User Id=sa;Password=$(DB_PASSWORD);TrustServerCertificate=True;"
        resources:
          requests:
            cpu: {{ .Values.backend.resources.requests.cpu | quote }}
            memory: {{ .Values.backend.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.backend.resources.limits.cpu | quote }}
            memory: {{ .Values.backend.resources.limits.memory | quote }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: retailstore-backend-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "retailstore.labels" . | nindent 4 }}
spec:
  selector:
    app: retailstore-backend
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
