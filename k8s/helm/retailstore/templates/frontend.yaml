apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailstore-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "retailstore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: retailstore-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: retailstore-frontend
    spec:
      containers:
      - name: nginx
        image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: {{ .Values.frontend.resources.requests.cpu | quote }}
            memory: {{ .Values.frontend.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.frontend.resources.limits.cpu | quote }}
            memory: {{ .Values.frontend.resources.limits.memory | quote }}
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: retailstore-frontend-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "retailstore.labels" . | nindent 4 }}
spec:
  selector:
    app: retailstore-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
